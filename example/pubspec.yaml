name: idr_agent_demo
description: >-
  Flutter example for idr_dart_sdk — source (connect) and target (agent) flows.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  idr_dart_sdk:
    path: ../
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
