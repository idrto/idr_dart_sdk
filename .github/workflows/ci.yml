name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dart:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Pub get
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Publish dry-run
        run: dart pub publish --dry-run

  flutter-example:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Analyze example (no native lib required)
        run: |
          cd example
          flutter pub get
          dart analyze lib
