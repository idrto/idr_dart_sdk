name: idr_dart_sdk
description: >-
  Dart bindings for the idr.to agent (`libidr_sdk` via FFI).
  Pure Dart — no Flutter dependency. Embed signaling, WebRTC tunneling, and
  agent lifecycle in Dart CLI tools, servers, or Flutter apps.
version: 1.0.0
homepage: https://idr.to
repository: https://github.com/idrto/idr_dart_sdk
issue_tracker: https://github.com/idrto/idr_dart_sdk/issues
documentation: https://github.com/idrto/idr_dart_sdk#readme

topics:
  - networking
  - webrtc
  - ffi

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  ffi: ^2.1.0
  meta: ^1.12.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
